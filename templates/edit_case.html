<!DOCTYPE html>
<html>
<head>
    <title>Update Case Status</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:500px;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        .icon{
            text-align:center;
            font-size:40px;
            margin-bottom:10px;
        }

        h2{
            text-align:center;
            color:#1e3c72;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#333;
        }

        input,
        select{
            width:100%;
            padding:12px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input:focus,
        select:focus{
            outline:none;
            border-color:#1e3c72;
            box-shadow:0 0 8px rgba(30,60,114,0.3);
        }

        button{
            width:100%;
            background:#1e3c72;
            color:white;
            border:none;
            padding:14px;
            border-radius:8px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#16325c;
        }

        .readonly{
            background:#f5f5f5;
            cursor:not-allowed;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="icon">📋</div>

    <h2>Update Case Status</h2>

    <form action="/update-case/{{ case.case_id }}" method="POST">

        <label>Crime Type</label>

        <input type="text"
               value="{{ case.crime_type }}"
               class="readonly"
               readonly>

        <label>Case Status</label>

        <select name="status">

            <option value="Open"
            {% if case.case_status == 'Open' %}selected{% endif %}>
            Open
            </option>

            <option value="Investigating"
            {% if case.case_status == 'Investigating' %}selected{% endif %}>
            Investigating
            </option>

            <option value="Closed"
            {% if case.case_status == 'Closed' %}selected{% endif %}>
            Closed
            </option>

        </select>

        <button type="submit">
            Update Status
        </button>

    </form>

</div>

</body>
</html>
