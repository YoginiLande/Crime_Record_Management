<!DOCTYPE html>
<html>
<head>
    <title>View Criminals</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
      <link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container mt-5">

    <h2>Criminal Records</h2>

    <table class="table table-bordered table-striped">

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Address</th>
                <th>Crime History</th>
            </tr>
        </thead>

        <tbody>

            {% for criminal in criminals %}

            <tr>
                <td>{{ criminal.criminal_id }}</td>
                <td>{{ criminal.name }}</td>
                <td>{{ criminal.age }}</td>
                <td>{{ criminal.gender }}</td>
                <td>{{ criminal.address }}</td>
                <td>{{ criminal.crime_history }}</td>
            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
