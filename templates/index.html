<!DOCTYPE html>
<html>
<head>
    <title>Crime Record Management System</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:50px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            width:600px;
        }

        h1{
            color:#1e3c72;
            margin-bottom:20px;
        }

        p{
            color:#555;
            margin-bottom:30px;
            font-size:18px;
        }

        .btn{
            text-decoration:none;
            margin:10px;
        }

        .btn button{
            width:180px;
            padding:12px;
            border:none;
            border-radius:8px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn{
            background:#1e3c72;
            color:white;
        }

        .register-btn{
            background:#28a745;
            color:white;
        }

        .login-btn:hover{
            background:#16325c;
        }

        .register-btn:hover{
            background:#1e7e34;
        }

        .icon{
            font-size:60px;
            margin-bottom:15px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="icon">🚔</div>

    <h1>Crime Record Management System</h1>

    <p>
        Digital platform for managing crime cases,
        criminal records, police investigations,
        reports and crime analytics.
    </p>

    <a href="/login-page" class="btn">
        <button class="login-btn">Login</button>
    </a>

    <a href="/register-page" class="btn">
        <button class="register-btn">Register</button>
    </a>

</div>

</body>
</html>
