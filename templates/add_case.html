<!DOCTYPE html>
<html>
<head>
    <title>Add Crime Case</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:500px;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#1e3c72;
        }

        label{
            font-weight:bold;
            color:#333;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input:focus,
        textarea:focus,
        select:focus{
            outline:none;
            border-color:#1e3c72;
            box-shadow:0 0 8px rgba(30,60,114,0.3);
        }

        textarea{
            height:100px;
            resize:none;
        }

        button{
            width:100%;
            background:#1e3c72;
            color:white;
            border:none;
            padding:14px;
            border-radius:8px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#16325c;
        }

        .icon{
            text-align:center;
            font-size:40px;
            margin-bottom:10px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="icon">🚔</div>

    <h2>Add Crime Case</h2>

    <form action="/add-case" method="POST">

        <label>Crime Type</label>
        <input type="text"
               name="crime_type"
               placeholder="Enter Crime Type"
               required>

        <label>Description</label>
        <textarea name="description"
                  placeholder="Enter Crime Description"></textarea>

        <label>Location</label>
        <input type="text"
               name="location"
               placeholder="Enter Crime Location"
               required>

        <label>Status</label>

        <select name="status">
            <option value="Open">Open</option>
            <option value="Investigating">Investigating</option>
            <option value="Closed">Closed</option>
        </select>

        <button type="submit">
            Add Case
        </button>

    </form>

</div>

</body>
</html>
