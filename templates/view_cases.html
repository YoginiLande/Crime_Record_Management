<!DOCTYPE html>
<html>
<head>
    <title>View Cases</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">All Crime Cases</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                <th>Case ID</th>
                <th>Crime Type</th>
                <th>Description</th>
                <th>Location</th>
                <th>Status</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

        {% for case in cases %}

            <tr>

                <td>{{ case.case_id }}</td>
                <td>{{ case.crime_type }}</td>
                <td>{{ case.description }}</td>
                <td>{{ case.location }}</td>
                <td>{{ case.case_status }}</td>
                <td>{{ case.reported_date }}</td>

                <td>

                    <a href="/edit-case/{{ case.case_id }}"
                       class="btn btn-warning btn-sm">
                        Update
                    </a>

                    <a href="/generate-report/{{ case.case_id }}"
                       class="btn btn-danger btn-sm">
                        PDF Report
                    </a>

                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
