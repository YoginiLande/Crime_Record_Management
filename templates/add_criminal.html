<!DOCTYPE html>
<html>
<head>
    <title>Add Criminal Record</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:500px;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        .icon{
            text-align:center;
            font-size:40px;
            margin-bottom:10px;
        }

        h2{
            text-align:center;
            color:#1e3c72;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#333;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:12px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input:focus,
        select:focus,
        textarea:focus{
            outline:none;
            border-color:#1e3c72;
            box-shadow:0 0 8px rgba(30,60,114,0.3);
        }

        textarea{
            height:120px;
            resize:none;
        }

        button{
            width:100%;
            background:#1e3c72;
            color:white;
            border:none;
            padding:14px;
            border-radius:8px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#16325c;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="icon">👮</div>

    <h2>Add Criminal Record</h2>

    <form action="/add-criminal" method="POST">

        <label>Name</label>
        <input type="text"
               name="name"
               placeholder="Enter Criminal Name"
               required>

        <label>Age</label>
        <input type="number"
               name="age"
               placeholder="Enter Age"
               required>

        <label>Gender</label>
        <select name="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>

        <label>Criminal History</label>
        <textarea name="criminal_history"
                  placeholder="Enter Criminal History"></textarea>

        <button type="submit">
            Add Criminal
        </button>

    </form>

</div>

</body>
</html>
