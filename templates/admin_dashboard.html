<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

    <style>
        body{
            background:#f4f6f9;
        }

        .sidebar{
            min-height:100vh;
            background:#212529;
            color:white;
            padding-top:20px;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:12px;
            border-radius:5px;
            margin-bottom:5px;
        }

        .sidebar a:hover{
            background:#343a40;
        }

        .card{
            border:none;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">

            <h4 class="text-center mb-4">🚔 Admin Panel</h4>

            <a href="/admin-dashboard">Dashboard</a>
            <a href="/view-cases">Cases</a>
            <a href="/view-criminals">Criminal Records</a>
            <a href="#">Reports</a>
            <a href="#">Logout</a>

        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <h2>Welcome Admin</h2>
            <p>Crime Record Management System</p>

            <!-- Cards -->
            <div class="row mt-4">

                <div class="col-md-4">
                    <div class="card p-3">
                        <h5>Total Users</h5>
                        <h2>25</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card p-3">
                        <h5>Total Cases</h5>
                        <h2>120</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card p-3">
                        <h5>Criminal Records</h5>
                        <h2>58</h2>
                    </div>
                </div>

            </div>

            <!-- Recent Activities -->
            <div class="card mt-4 p-4">

                <h4>Recent Activities</h4>

                <table class="table table-bordered mt-3">

                    <thead>
                        <tr>
                            <th>Case ID</th>
                            <th>Crime Type</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Cyber Crime</td>
                            <td>Open</td>
                        </tr>

                        <tr>
                            <td>2</td>
                            <td>Fraud</td>
                            <td>Investigating</td>
                        </tr>
                    </tbody>

                </table>

            </div>

            <!-- Crime Analysis Chart -->
            <div class="card mt-4 p-4">

                <h4>Crime Analysis</h4>

                <canvas id="crimeChart"></canvas>

            </div>

        </div>

    </div>

</div>

<script>

   const labels = [
      {% for item in crime_status %}
        "{{ item.crime_type }}",
     {% endfor %}
];

const data = [
    {% for item in crime_status %}
        {{ item.total }},
    {% endfor %}
];

const ctx = document.getElementById('crimeChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Total Crimes',
            data: data,
            borderWidth: 1
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>

</body>
</html>
